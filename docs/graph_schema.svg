<svg width="680" viewBox="0 0 680 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
<title>M7U4 graph schema</title>
<desc>Property graph schema for the Duplex Apartment IFC model. Top row shows the spatial hierarchy Project to Site to Building to Storey to Space connected by CONTAINS relationships. The Storey is also connected by CONTAINS to a central Element node, which has three outgoing relationships: DEFINED_BY to Type, HAS_PSET to PropertySet, and MADE_OF to Material. The PropertySet node has an outgoing HAS_PROPERTY relationship to a Property node.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<g>
<rect x="40" y="40" width="105" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="92.5" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Project</text>
</g>
<g>
<rect x="161" y="40" width="105" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="213.5" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Site</text>
</g>
<g>
<rect x="282" y="40" width="105" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="334.5" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Building</text>
</g>
<g>
<rect x="403" y="40" width="105" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="455.5" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Storey</text>
</g>
<g>
<rect x="524" y="40" width="105" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="576.5" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Space</text>
</g>

<line x1="145" y1="62" x2="161" y2="62" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="266" y1="62" x2="282" y2="62" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="387" y1="62" x2="403" y2="62" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="508" y1="62" x2="524" y2="62" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="334.5" y="105" text-anchor="middle" font-size="12" fill="#5F5E5A">CONTAINS (IfcRelAggregates)</text>

<path d="M 455 84 V 130 H 340 V 160" stroke="#5F5E5A" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="350" y="124" text-anchor="start" font-size="12" fill="#5F5E5A">CONTAINS</text>

<g>
<rect x="240" y="160" width="200" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="178" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Element</text>
<text x="340" y="198" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Physical building element</text>
</g>

<line x1="270" y1="216" x2="140" y2="270" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="216" x2="340" y2="270" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="410" y1="216" x2="540" y2="270" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

<text x="180" y="240" text-anchor="end" font-size="12" fill="#5F5E5A">DEFINED_BY</text>
<text x="330" y="246" text-anchor="end" font-size="12" fill="#5F5E5A">HAS_PSET</text>
<text x="500" y="240" text-anchor="start" font-size="12" fill="#5F5E5A">MADE_OF</text>

<g>
<rect x="70" y="270" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="140" y="288" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Type</text>
<text x="140" y="308" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">IfcTypeObject</text>
</g>

<g>
<rect x="270" y="270" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="288" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">PropertySet</text>
<text x="340" y="308" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Pset instance</text>
</g>

<g>
<rect x="470" y="270" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="540" y="288" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Material</text>
<text x="540" y="308" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">IfcMaterial</text>
</g>

<line x1="340" y1="326" x2="340" y2="380" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="356" text-anchor="start" font-size="12" fill="#5F5E5A">HAS_PROPERTY</text>

<g>
<rect x="270" y="380" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="398" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Property</text>
<text x="340" y="418" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Name + Value pair</text>
</g>
</svg>
